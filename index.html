<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A2540">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="refresh" content="3;url=https://bsprdevtools.github.io/mentor-device-check/">
<link rel="canonical" href="https://bsprdevtools.github.io/mentor-device-check/">
<title>移転しました｜機種判定ツール｜株式会社ベスプラ</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", "Noto Sans JP", "Meiryo", sans-serif;
    background: #F4F6F9;
    color: #1A1A1A;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-size: 16px;
  }
  .topbar {
    background: #0A2540;
    color: #fff;
    padding: 7px 12px;
    font-size: 0.78rem;
    border-bottom: 2px solid #0F62FE;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar .brand { font-weight: 600; }
  .topbar .org { opacity: 0.88; font-size: 0.72rem; }

  main {
    flex: 1;
    max-width: 560px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 16px;
  }

  .alert {
    background: #FBF1D8;
    border: 1px solid #C28A00;
    border-left: 6px solid #C28A00;
    border-radius: 6px;
    padding: 20px 18px;
    margin-bottom: 20px;
  }
  .alert-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: #7A4F00;
    margin: 0 0 10px;
  }
  .alert-body {
    color: #5A4500;
    margin: 0;
    font-size: 0.98rem;
    line-height: 1.7;
  }

  .new-url-card {
    background: #fff;
    border: 1px solid #C5CFDB;
    border-radius: 6px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .new-url-label {
    font-size: 0.85rem;
    color: #4A5566;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .new-url {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 0.92rem;
    color: #0A2540;
    background: #F4F6F9;
    padding: 12px;
    border-radius: 4px;
    word-break: break-all;
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .button {
    display: block;
    width: 100%;
    padding: 16px;
    background: #0A2540;
    color: #fff;
    text-decoration: none;
    text-align: center;
    border-radius: 4px;
    font-weight: 700;
    font-size: 1.0rem;
    letter-spacing: 0.04em;
  }
  .button:hover { background: #1B3A5C; }

  .info {
    background: #E0EBF8;
    border-left: 4px solid #2E5A8A;
    border-radius: 4px;
    padding: 14px 16px;
    font-size: 0.88rem;
    color: #08407A;
    line-height: 1.65;
  }
  .info strong { display: block; margin-bottom: 4px; }

  .countdown {
    text-align: center;
    color: #4A5566;
    font-size: 0.85rem;
    margin-top: 16px;
  }

  footer {
    background: #0A2540;
    color: #fff;
    padding: 10px 12px;
    text-align: center;
    font-size: 0.72rem;
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">機種判定ツール</span>
  <span class="org">株式会社ベスプラ</span>
</div>

<main>

  <div class="alert">
    <h1 class="alert-title">URLが変更になりました</h1>
    <p class="alert-body">
      機種判定ツールは、新しいURLに移転しました。<br>
      3秒後に自動的に新しいページへ移動します。
    </p>
  </div>

  <div class="new-url-card">
    <div class="new-url-label">新しいURL</div>
    <div class="new-url">https://bsprdevtools.github.io/mentor-device-check/</div>
    <a class="button" href="https://bsprdevtools.github.io/mentor-device-check/">
      新しいページを開く ›
    </a>
  </div>

  <div class="info">
    <strong>QRコードをお持ちのメンターの方へ</strong>
    現在お使いのQRコードは古いものです。新しいQRコードへの差し替えをお願いいたします。
  </div>

  <div class="countdown" id="countdown">3秒後に自動で移動します…</div>

</main>

<footer>
  株式会社ベスプラ｜対面サポート現場用
</footer>

<script>
  let count = 3;
  const el = document.getElementById('countdown');
  const timer = setInterval(() => {
    count--;
    if (count > 0) {
      el.textContent = count + '秒後に自動で移動します…';
    } else {
      clearInterval(timer);
      el.textContent = '移動中…';
    }
  }, 1000);
</script>

</body>
</html>
